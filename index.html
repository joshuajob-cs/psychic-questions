<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/backdrop.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <header>
      <h3>🔮 Psychic Questions 🤔</h3>
      <nav>
        <div class="dropdown">
          <button
            class="btn btn-primary dropdown-toggle"
            type="button"
            id="accountDropdown"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            Account
          </button>
          <ul class="dropdown-menu" aria-labelledby="accountDropdown">
            <li><a class="dropdown-item" href="HTML/login.html">Login</a></li>
            <li>
              <a class="dropdown-item" href="HTML/sign-up.html">Sign Up</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <h1>Join Game</h1>
      <form action="HTML/enter-name.html">
        <input type="text" placeholder="Join Code" required />
        <div>
          <button type="submit">Join</button>
        </div>
      </form>
      <img
        src="HTML/Brain.png"
        width="300"
        alt="You climb up a latter to reach a brain"
      />
    </main>
    <footer>
      <h2>
        <a href="https://github.com/joshuajob-cs/startup">GitHub</a>
      </h2>
      <p>&copy; 2026 Psychic Questions</p>
    </footer>
  </body>
</html>
